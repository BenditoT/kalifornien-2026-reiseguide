.al:active{opacity:.7}
.al svg{width:13px;height:13px;flex-shrink:0}
.ph{color:var(--green);font-weight:600;text-decoration:none;font-size:13px}
.tl{position:relative;padding-left:26px}.tl::before{content:'';position:absolute;left:9px;top:6px;bottom:6px;width:2px;background:#e2e8f0}
.ti2{position:relative;margin-bottom:14px}
.td{position:absolute;left:-22px;top:4px;width:12px;height:12px;border-radius:50%;border:2px solid #fff;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.tm{font-size:11px;font-weight:700}.tn{font-size:13px;font-weight:600;margin-top:1px}.tx{font-size:11px;color:var(--muted);margin-top:1px}
.opt-box{background:#f0f9ff;border:1px solid #bae6fd;border-radius:var(--r);padding:12px;margin-bottom:10px}
.opt-box.warn{background:#fef3c7;border-color:#fde68a}
.opt-box h4{font-size:13px;font-weight:700;color:var(--blue);margin-bottom:6px}
.opt-box.warn h4{color:#92400e}
.opt-row{display:flex;gap:8px;margin-bottom:8px}
.opt-card{flex:1;background:#fff;border-radius:8px;padding:10px;border:2px solid #e2e8f0;font-size:12px;cursor:pointer;transition:all .2s}
.opt-card:active{border-color:var(--blue);background:#eff6ff}
.opt-card .oc-t{font-weight:700;margin-bottom:4px;font-size:13px}.opt-card .oc-d{color:var(--muted);line-height:1.4}

.marker-dot{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;border:3px solid;box-shadow:0 2px 8px rgba(0,0,0,.2);background:#fff;transition:transform .2s}

.cb2{width:22px;height:22px;border-radius:6px;border:2px solid #cbd5e1;flex-shrink:0;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;margin-top:1px}
.cb2.chk{background:var(--green);border-color:var(--green)}.cb2.chk::after{content:'\2713';color:#fff;font-size:14px;font-weight:700}
.footer{text-align:center;padding:20px;font-size:11px;color:var(--muted)}
</style>
</head>

    cards:[
      {emoji:'🥾',title:'Pfeiffer Falls Trail',cls:'g',body:'<p><strong>Start:</strong> Trailhead beim Pfeiffer Big Sur Lodge-Parkplatz (im State Park)</p><p><strong>Distanz:</strong> 3,2 km (2 Mi) roundtrip | <strong>Dauer:</strong> 45-60 Min</p><p><strong>Schwierigkeit:</strong> Leicht bis moderat, 60m Höhenunterschied</p><p>18m hoher Wasserfall durch Redwood- und Eichenwald. Im April mit guter Wassermenge!</p><p><strong>Parking:</strong> 2 Parkplätze am Trailhead — FRÜH los (8 Uhr)! $10/Fahrzeug oder im Camping inkl.</p><p>💡 Tipp: Valley View Trail als Verlängerung (+1 km) für Panoramablick!</p>',links:[{text:'Apple Maps Trailhead',url:'https://maps.apple.com/?q=Pfeiffer+Falls+Trail&ll=36.2500,-121.7833'},{text:'AllTrails',url:'https://www.alltrails.com/trail/us/california/pfeiffer-falls-trail'}]},
      {emoji:'🏔️',title:'Partington Cove Trail',cls:'c',body:'<p><strong>Start:</strong> Pullout an Hwy 1, 2 Meilen nördlich Julia Pfeiffer Burns SP</p><p><strong>GPS:</strong> 36.1770, -121.6937</p><p><strong>Distanz:</strong> 1,9 km (1,2 Mi) roundtrip | <strong>Dauer:</strong> 40-50 Min</p><p><strong>Schwierigkeit:</strong> Moderat (steil bergab → steil bergauf zurück!)</p><p>Steiler Pfad hinunter, über eine Holzbrücke, durch einen Tunnel zur geschützten Bucht. Spektakulär!</p><p><strong>Parking:</strong> Highway-Pullout, RV passt — VORSICHTIG einparken. Beide Straßenseiten möglich.</p><p>⚠️ Gratis, kein Eintritt!</p>',links:[{text:'Apple Maps',url:'https://maps.apple.com/?q=Partington+Cove&ll=36.1770,-121.6937'},{text:'AllTrails',url:'https://www.alltrails.com/trail/us/california/partington-cove-trail'}]},
      {emoji:'🐘',title:'Elephant Seal Vista Point — PFLICHT!',cls:'o',body:'<p><strong>Hunderte riesige See-Elefanten direkt am Strand!</strong> Holzsteg führt ganz nah ran. Bullen können über 2 Tonnen wiegen!</p><p>Im April: Junge Tiere und Weibchen, mausernde Jungtiere. Nicht so voll wie im Winter.</p><p><strong>Parking:</strong> Großer kostenloser Parkplatz, RV kein Problem!</p><p>💡 Mika wird die Viecher lieben!</p>',links:[{text:'Apple Maps',url:'https://maps.apple.com/?q=Elephant+Seal+Vista+Point&ll=35.6625,-121.2570'}]},
      {emoji:'🏰',title:'Hearst Castle (Fotostopp)',cls:'p',body:'<p>Das märchenhafte Schloss von Medienmogul William Randolph Hearst.</p><p>💡 Side-Fact: Hearst hatte einen privaten Zoo mit Zebras — die Nachkommen leben noch wild an der Küste!</p>',links:[{text:'Apple Maps',url:'https://maps.apple.com/?q=Hearst+Castle&ll=35.6852,-121.1682'}]},
      {emoji:'🫧',title:'Bubblegum Alley SLO',body:'<p>Gasse komplett mit Kaugummi beklebt seit den 1960ern! 733 Higuera St. Instagram-Pflicht!</p><p>💡 SLO = eine der glücklichsten Städte der USA (National Geographic)</p>',links:[{text:'Apple Maps',url:'https://maps.apple.com/?q=Bubblegum+Alley+San+Luis+Obispo&ll=35.2800,-120.6596'}]},
      {emoji:'🍜',title:'Splash Café — Clam Chowder!',cls:'o',body:'<p>Berühmteste Clam Chowder der Central Coast! 197 Pomeroy Ave, Pismo Beach. In einer Brotschüssel serviert. Oft Schlange, aber lohnt sich!</p>',links:[{text:'Apple Maps',url:'https://maps.apple.com/?q=Splash+Cafe+Pismo+Beach&ll=35.1432,-120.6408'}]},
      {emoji:'🏕️',title:'Übernachtung Pismo Beach',cls:'g',body:'<p><strong>🥇 Pismo Coast Village RV</strong> $70-90 — 400 Sites, Full Hookups, Pool, am Strand. Tel: (805) 773-1811</p><p><strong>🥈 Pismo Sands RV (Oceano)</strong> $55-75 — moderner, ruhiger</p><p><strong>🥉 Coastal Dunes RV (Oceano)</strong> $45-55 — County Park, günstig</p><p><strong>💡 Gratis: Walmart Arroyo Grande</strong> — Manager fragen! 15 Min von Pismo</p><p><strong>💡 Gratis: Morro Bay Hafen</strong> (park4night) — ruhig, 3 Tage erlaubt</p>',links:[{text:'Pismo Coast Village',url:'https://www.visitpcv.com'},{text:'Apple Maps Pismo RV',url:'https://maps.apple.com/?q=Pismo+Coast+Village+RV&ll=35.1318,-120.6320'}]},

    cards:[
      {emoji:'🌅',title:'Arroyo Hondo Vista Point',body:'<p>Kostenloser Übernachtungsspot direkt am Hwy 101, ~25 km westlich von Santa Barbara. Offiziell 8h Parklimit, Overnight aber geduldet.</p><p>⚠️ Keine Toiletten, kein Wasser — nur der Blick aufs Meer und die Stille!</p>',links:[{text:'Apple Maps',url:'https://maps.apple.com/?q=Arroyo+Hondo+Vista+Point&ll=34.4723,-119.8744'}]},
      {emoji:'🌴',title:'Santa Barbara — Parking & Tipps',body:'<p>Das „amerikanische Riviera"! Weiße spanische Kolonialarchitektur, Palmen, mediterrane Atmosphäre.</p><p>🅿️ <strong>Garden Street Lot (Lot 6)</strong> — einer von nur 4 offiziellen RV-Lots in SB! 6 gelb markierte Oversized-Plätze. 90 Min frei, dann $3/Std (max $20/Tag). Direkt an der Funk Zone!</p><p><strong>Stearns Wharf:</strong> ~10 Min zu Fuß. Ältester Holz-Pier der Westküste (1872).</p><p><strong>Funk Zone:</strong> 2-3 Min vom Lot! Craft Beer, Weinbars, Street Art.</p><p>🌮 <strong>Lilly\'s Taqueria</strong> — authentische mexikanische Tacos, von Locals geliebt!</p><p>⚠️ SB ist STRENG mit großen Fahrzeugen (Ordinance seit 2017)! NUR in ausgewiesenen Lots parken, sonst Strafzettel!</p><p>Backup: Leadbetter Lot (ebenfalls Oversized erlaubt, weiter nördlich)</p>',links:[{text:'Garden St Lot',url:'https://maps.apple.com/?q=Garden+Street+Parking+Lot+Santa+Barbara&ll=34.4140,-119.6870'},{text:'Stearns Wharf',url:'https://maps.apple.com/?q=Stearns+Wharf+Santa+Barbara&ll=34.4098,-119.6855'},{text:'SB Parking Info',url:'https://santabarbaraca.gov/things-do/waterfront/parking-services/oversized-vehicle-parking-lots'}]},
      {emoji:'🍔',title:'In-N-Out Burger',cls:'o',body:'<p><strong>Kalifornien-Klassiker!</strong> DAS Fast-Food-Erlebnis an der Westküste. Adresse: 2070 E Harbor Blvd, Ventura.</p><p>Geheimtipp: „Animal Style" bestellen (Senf-gegrilltes Patty, extra Pickles, gegrillte Zwiebeln). Shake nicht vergessen!</p><p>💡 Side-Fact: In-N-Out gibt es NUR in wenigen US-Staaten — ein echtes Kalifornien-Erlebnis!</p>',links:[{text:'Apple Maps Ventura',url:'https://maps.apple.com/?q=In-N-Out+Burger+2070+E+Harbor+Blvd+Ventura&ll=34.2675,-119.2290'}]},
      {emoji:'⚠️',title:'WICHTIG: Route & Verkehr',cls:'r',body:'<p><strong>🚫 KEIN PCH/Malibu!</strong> Der Pacific Coast Highway ist für euer 7-8m Wohnmobil zu eng — enge Kurven, steile Grades, kein Ausweichen möglich.</p><p><strong>✅ Immer US-101 → 405 nehmen!</strong> Sicher, breiter, schneller.</p><p><strong>🕐 Sonntag-Traffic:</strong> Schlimmste Zeit 12:45-15:00 Uhr. Plant 1 Stunde Puffer ein!</p>'},
      {emoji:'🏕️',title:'Dockweiler Beach RV Park (2 Nächte)',cls:'g',body:'<p><strong>$65-75/Nacht</strong> | 118 Sites, Full Hookups (50 Amp!)</p><p>DIREKT am Strand — einer der wenigen RV-Parks direkt am Meer in LA! Lagerfeuer am Strand erlaubt (Fire Rings = first-come, bis 15 Uhr da sein!).</p><p>💡 Side-Fact: Direkt neben LAX — Flugzeuge landen über euch! Spektakulär nachts.</p><p>💳 Nur Kartenzahlung, kein Bargeld.</p><p>⚠️ <strong>OSTERWOCHE = SOFORT BUCHEN!</strong> Anrufen: (310) 322-4951 oder (800) 950-7275</p>',links:[{text:'Buchung',url:'https://dockweilerrvpark.com'},{text:'Tel: (310) 322-4951',url:'tel:+13103224951'},{text:'Apple Maps',url:'https://maps.apple.com/?q=Dockweiler+RV+Park&ll=33.9232,-118.4398'}]},
      {emoji:'🛒',title:'Grocery-Stopp El Segundo',body:'<p>Letzter großer Supermarkt vor Dockweiler! Unbedingt holen:</p><p>☐ Marshmallows (große!)</p><p>☐ Graham Crackers</p><p>☐ Hershey\'s Schokolade</p><p>☐ Getränke, Snacks, Wasser</p><p>☐ Holzkohle/Feuerholz (oder am Strand kaufen)</p><p>= S\'mores am Lagerfeuer! 🔥</p>',links:[{text:'Ralph\'s El Segundo',url:'https://maps.apple.com/?q=Ralphs+El+Segundo&ll=33.9170,-118.4040'}]},

    cards:[
      {emoji:'🚲',title:'Metro Bike E-Bikes — So funktionierts!',cls:'g',body:'<p><strong>Metro Bike Share</strong> hat E-Bike-Stationen entlang der ganzen Küste!</p><p><strong>Preise:</strong></p><p>• Regulär: $1.75 / 30 Min</p><p>• E-Bike: +$1.00 Zuschlag pro Fahrt</p><p>• <strong>Tagespass: $5</strong> = unbegrenzt 30-Min-Fahrten (EMPFOHLEN!)</p><p><strong>Bezahlung:</strong> Metro Bike App herunterladen + Konto anlegen. Alternativ physische TAP-Karte am Automaten.</p><p>⚠️ <strong>Digital TAP (Apple Wallet) geht NICHT für Bikes!</strong> Nur App oder physische Karte.</p><p><strong>Eure Route — Marvin Braude Bike Trail (10 km, komplett flach):</strong></p><p>1️⃣ Dockweiler/Playa del Rey → Venice Beach: <strong>6 km, ~25 Min</strong></p><p>2️⃣ Venice → Abbot Kinney Blvd: <strong>1 km, 3 Min</strong></p><p>3️⃣ Abbot Kinney → Santa Monica Pier: <strong>4 km, ~15 Min</strong></p><p>4️⃣ Bikes zurückgeben: Metro Station Downtown Santa Monica</p><p>⚠️ <strong>HELM PFLICHT für Mika!</strong> Kalifornisches Gesetz: unter 18 = Helm. Mitbringen oder am Boardwalk kaufen (~$15).</p><p>⚠️ Auf dem Venice Boardwalk selbst: Fahrräder VERBOTEN! Den parallel verlaufenden Bike Path nutzen — der ist sogar besser (keine Fußgänger).</p><p><strong>Warum genau dieser Trail?</strong> Der Marvin Braude Trail ist einer der schönsten urbanen Radwege der Welt: 35 km asphaltiert direkt am Pazifik, flach wie ein Pfannkuchen, eigene Spur getrennt von Autos und Fußgängern. Perfekt für Familien!</p>',links:[{text:'Metro Bike App & Info',url:'https://bikeshare.metro.net/'},{text:'Stationen-Karte (Echtzeit)',url:'https://bikeshare.metro.net/stations/'},{text:'Google Maps: Dockweiler → Venice (Rad)',url:'https://www.google.com/maps/dir/Dockweiler+State+Beach,+12501+Vista+Del+Mar,+Playa+Del+Rey,+CA+90293/Venice+Beach+Boardwalk,+Ocean+Front+Walk,+Venice,+CA/@33.958,-118.462,13z/data=!3m1!4b1!4m14!4m13!1m5!1m1!1s0x80c2b123d6b28c11:0xd82ddc6e4f5d57d!2m2!1d-118.4398!2d33.9256!1m5!1m1!1s0x80c2baa4ad5a27ed:0x5805bcdae86c7c15!2m2!1d-118.4738!2d33.9850!3e1'},{text:'Google Maps: Venice → Santa Monica (Rad)',url:'https://www.google.com/maps/dir/Venice+Beach+Boardwalk,+Venice,+CA/Santa+Monica+Pier,+200+Santa+Monica+Pier,+Santa+Monica,+CA+90401/@33.998,-118.494,14z/data=!3m1!4b1!4m14!4m13!1m5!1m1!1s0x80c2baa4ad5a27ed:0x5805bcdae86c7c15!2m2!1d-118.4738!2d33.9850!1m5!1m1!1s0x80c2a4cec850a04b:0x1c18cf5d47adf2dd!2m2!1d-118.4985!2d34.0094!3e1'}]},
      {emoji:'🏄',title:'Venice Beach — Boardwalk & Skatepark',body:'<p><strong>Warum hierhin?</strong> Venice ist DAS verrückteste Strandviertel der Welt: Muscle Beach (Freiluft-Fitnessstudio seit 1934), weltberühmter Skatepark, Straßenkünstler, bunte Charaktere — pures LA-Feeling!</p><p>🛹 <strong>Venice Skatepark:</strong> Weltberühmt! Gratis, 8-19 Uhr. <strong>HELM + SCHONER PFLICHT!</strong> Board leihen am Boardwalk ~$10-15.</p><p>🏠 <strong>Venice Canals:</strong> 10 Min zu Fuß vom Boardwalk — hübsche Kanäle mit bunten Häusern (tolles Foto!)</p><p>💡 Arnold Schwarzenegger trainierte hier in den 70ern. Der Skatepark wurde von Skatelegende Jay Adams inspiriert.</p>',links:[{text:'Google Maps: Venice Skatepark',url:'https://www.google.com/maps/place/Venice+Skatepark,+1800+Ocean+Front+Walk,+Venice,+CA+90291'},{text:'Google Maps: Venice Canals',url:'https://www.google.com/maps/place/Venice+Canals,+Venice,+Los+Angeles,+CA+90292'},{text:'Google Maps: Muscle Beach',url:'https://www.google.com/maps/place/Muscle+Beach+Venice,+1800+Ocean+Front+Walk,+Venice,+CA+90291'}]},
      {emoji:'🛍️',title:'Abbot Kinney Blvd — Ines\u0027 Quartier Latin!',cls:'p',body:'<p><strong>Warum hierhin?</strong> Von GQ Magazine zum „Coolest Block in America" gekürt! 1 Meile mit Indie-Boutiquen, Galerien, Designerläden, Vintage-Shops und Cafés. Wie das Quartier Latin oder Le Marais in Paris — nur mit Palmen!</p><p><strong>Adresse:</strong> 1300-1700 Abbot Kinney Blvd, Venice, CA 90291</p><p><strong>Highlights zum Bummeln:</strong></p><p>🛍️ Tumbleweed & Dandelion (#1502) — Boho-Deko & Geschenke</p><p>👗 Nati Boutique (#1503) — Indie-Fashion</p><p>👰 Grace Loves Lace (#1510) — Australisches Brautmodedesign</p><p>🍦 Salt & Straw — Handgemachtes Eis mit verrückten Sorten!</p><p>🎨 The Piece Collective — Lokale Kunstgalerie</p><p><strong>Tipp:</strong> Bikes an nächster Metro Bike Station abstellen, 30-45 Min bummeln, dann weiterradeln zum Pier.</p>',links:[{text:'Google Maps: Abbot Kinney Blvd',url:'https://www.google.com/maps/place/Abbot+Kinney+Blvd,+Venice,+CA+90291'},{text:'Google Maps: Salt & Straw Eis',url:'https://www.google.com/maps/place/Salt+%26+Straw,+1357+Abbot+Kinney+Blvd,+Venice,+CA+90291'}]},
      {emoji:'🎡',title:'Santa Monica Pier — Riesenrad & Route 66!',cls:'o',body:'<p><strong>Warum hierhin?</strong> Das offizielle Ende der legendären Route 66 (Schild steht am Pier — Foto-Pflicht!). Pacific Park Vergnügungspark mit dem ikonischen Riesenrad (einziges solarbetriebenes Riesenrad der Welt!).</p><p>🎢 <strong>Pacific Park:</strong> Riesenrad $5-10, Achterbahn $7-12. Unlimited Ride Wristband $35.</p><p>🛍️ <strong>3rd Street Promenade:</strong> Open-Air-Einkaufsstraße mit Straßenkünstlern — 5 Min zu Fuß vom Pier.</p><p>🚲 <strong>Bikes zurückgeben:</strong> Metro Bike Station an der Downtown Santa Monica Metro Station (Colorado Ave / 4th St).</p><p>🚇 <strong>Metro E Line:</strong> 10 Min Fußweg vom Pier zur Station.</p>',links:[{text:'Google Maps: Santa Monica Pier',url:'https://www.google.com/maps/place/Santa+Monica+Pier,+200+Santa+Monica+Pier,+Santa+Monica,+CA+90401'},{text:'Google Maps: 3rd Street Promenade',url:'https://www.google.com/maps/place/Third+Street+Promenade,+Santa+Monica,+CA+90401'},{text:'Google Maps: Metro Station Downtown SM',url:'https://www.google.com/maps/place/Downtown+Santa+Monica+Station,+Colorado+Ave+%26+4th+St,+Santa+Monica,+CA+90401'},{text:'Google Maps: Route 66 End Sign',url:'https://www.google.com/maps/place/Route+66+End+of+the+Trail+Sign,+Santa+Monica+Pier,+CA'}]},
      {emoji:'🚇',title:'Metro TAP-Karte — Spart euch ~$100!',cls:'c',body:'<p><strong>TAP-Karte kaufen:</strong> Am Automaten in jeder Station ($2 Karte + Guthaben aufladen). Kreditkarte oder bar.</p><p><strong>Preis:</strong> $1.75/Fahrt, aber <strong>$5 Tagesdeckel!</strong> Nach 3 Fahrten fahrt ihr den Rest des Tages GRATIS. Kinder unter 5 frei.</p><p><strong>Eure komplette Metro-Route:</strong></p><p>1️⃣ <strong>E Line</strong> (Expo): Downtown SM → 7th/Metro Center — 50 Min, Richtung „Downtown LA"</p><p>2️⃣ <strong>Umstieg Red Line</strong>: 7th/Metro → Hollywood/Highland — 10 Min, Richtung „North Hollywood"</p><p>3️⃣ <strong>Red Line weiter</strong>: Hollywood/Highland → Vermont/Sunset — 5 Min, 2 Stops</p><p>= max. $5/Person/Tag × 3 = <strong>$15 total</strong></p><p>Vergleich: 4× Uber durch LA = $120-150!</p><p>💡 <strong>Umstieg 7th/Metro Center:</strong> Gleiche Station, nur Gleis wechseln. Schilder „Red Line North Hollywood" folgen.</p>',links:[{text:'TAP Info & Apple Wallet',url:'https://www.taptogo.net'},{text:'Metro Karte & Fahrplan',url:'https://www.metro.net/riding/maps/'},{text:'Google Maps: 7th/Metro Center Station',url:'https://www.google.com/maps/place/7th+Street+%2F+Metro+Center+Station,+Los+Angeles,+CA+90017'}]},
      {emoji:'🏛️',title:'Downtown LA — 4 Highlights in 45 Min!',cls:'o',body:'<p><strong>Warum Downtown?</strong> Montags sind The Broad + MOCA geschlossen — aber diese 4 Highlights sind ALLE OFFEN und fußläufig in 15 Min Radius!</p><p>🍜 <strong>Grand Central Market</strong> (317 S Broadway) — Historische Food Hall seit 1917! 40+ Stände: Tacos, Ramen, Falafel, Açaí. Mo 8-21 Uhr. Perfekt für einen schnellen Snack zwischendurch!</p><p>🚂 <strong>Angels Flight Railway</strong> (351 S Hill St) — Die kürzeste Bahnstrecke der Welt! 90 Sekunden Fahrt den Bunker Hill hoch. $1.50/Fahrt (75¢ mit TAP-Karte). Mo 7-22 Uhr. Mika wird es lieben!</p><p>🏢 <strong>Bradbury Building</strong> (304 S Broadway) — Atemberaubendes viktorianisches Atrium von 1893! Gusseiserne Geländer, offene Fahrstühle, Glasdach. Drehort von Blade Runner (1982). GRATIS, Mo 9-17 Uhr. Nur Erdgeschoss + 1. Stock zugänglich.</p><p>🎵 <strong>Walt Disney Concert Hall</strong> (111 S Grand Ave) — Frank Gehrys ikonisches Edelstahl-Gebäude. GRATIS Audio-Tour (10-15 Uhr, von John Lithgow gesprochen!). Garten auf dem Dach mit Rosen! Mo 10-18 Uhr.</p><p>⚠️ <strong>Skid Row:</strong> Nicht östlich der Central Ave gehen!</p>',links:[{text:'Google Maps: Grand Central Market',url:'https://www.google.com/maps/place/Grand+Central+Market,+317+S+Broadway,+Los+Angeles,+CA+90013'},{text:'Google Maps: Angels Flight',url:'https://www.google.com/maps/place/Angels+Flight+Railway,+351+S+Hill+St,+Los+Angeles,+CA+90013'},{text:'Google Maps: Bradbury Building',url:'https://www.google.com/maps/place/Bradbury+Building,+304+S+Broadway,+Los+Angeles,+CA+90013'},{text:'Google Maps: Disney Concert Hall',url:'https://www.google.com/maps/place/Walt+Disney+Concert+Hall,+111+S+Grand+Ave,+Los+Angeles,+CA+90012'},{text:'Google Maps: Walking Route DTLA',url:'https://www.google.com/maps/dir/Grand+Central+Market,+317+S+Broadway,+Los+Angeles/Angels+Flight+Railway,+351+S+Hill+St/Bradbury+Building,+304+S+Broadway/Walt+Disney+Concert+Hall,+111+S+Grand+Ave,+Los+Angeles,+CA+90012/@34.0515,-118.2510,16z/data=!4m26!4m25!1m5!1m1!1s0x80c2c64e7dea1c4b:0x66a1be498d265aea!2m2!1d-118.2488!2d34.0508!1m5!1m1!1s0x80c2c634c4ad8e8d:0x6c7df5b2a7f8c61e!2m2!1d-118.2510!2d34.0516!1m5!1m1!1s0x80c2c7b6f5b6a6a5:0x8a6d8c7a47b89c8f!2m2!1d-118.2486!2d34.0506!1m5!1m1!1s0x80c2c7b0d3bdd3bf:0x3b26daad3acf81b2!2m2!1d-118.2498!2d34.0553!3e2'}]},
      {emoji:'🎨',title:'Arts District — Ines\u0027 Kreuzberg in LA!',cls:'p',body:'<p><strong>Warum hierhin?</strong> Das kreativste Viertel LAs! Ehemalige Lagerhäuser voller Galerien, Street Art und Indie-Shops. Wie Kreuzberg/Friedrichshain in Berlin — nur mit Sonnenschein.</p><p><strong>Wo:</strong> Zwischen Alameda St und LA River, 1st St bis Violet St. 20 Min Fußweg von DTLA-Highlights.</p><p><strong>Must-Sees:</strong></p><p>🖼️ <strong>Hauser & Wirth</strong> (901 E 3rd St) — Weltklasse-Galerie in umgebauter Mehlmühle. Eintritt GRATIS.</p><p>🛍️ <strong>ROW DTLA</strong> (777 S Alameda St) — Indie-Boutiquen, Pop-up-Shops, Cafés in historischer Lagerhalle.</p><p>🎭 <strong>Art Share LA</strong> — Nonprofit mit wechselnden Ausstellungen.</p><p>📸 <strong>Murals:</strong> Einfach durch die Straßen laufen — an jeder Ecke riesige Wandkunstwerke! Beste Murals auf Traction Ave und entlang der 3rd Street.</p>',links:[{text:'Google Maps: Arts District',url:'https://www.google.com/maps/place/Arts+District,+Los+Angeles,+CA'},{text:'Google Maps: Hauser & Wirth',url:'https://www.google.com/maps/place/Hauser+%26+Wirth+Los+Angeles,+901+E+3rd+St,+Los+Angeles,+CA+90013'},{text:'Google Maps: ROW DTLA',url:'https://www.google.com/maps/place/ROW+DTLA,+777+S+Alameda+St,+Los+Angeles,+CA+90021'},{text:'Google Maps: Arts District → 7th/Metro (Bus)',url:'https://www.google.com/maps/dir/Arts+District,+Los+Angeles,+CA/7th+Street+Metro+Center,+Los+Angeles,+CA/@34.046,-118.248,15z/data=!3m1!4b1!4m14!4m13!1m5!1m1!1s0x80c2c636e0790455:0x6679463fab00c0cc!2m2!1d-118.2340!2d34.0404!1m5!1m1!1s0x80c2c7c0eaa5a80f:0xf35c3a47fa2bccc9!2m2!1d-118.2585!2d34.0486!3e3'}]},
      {emoji:'⭐',title:'Hollywood Boulevard — Walk of Fame!',body:'<p><strong>Warum hierhin?</strong> Hollywood muss man einmal im Leben gesehen haben! Liegt direkt auf der Metro Red Line Route zum Griffith Observatory — kein Umweg nötig.</p><p><strong>Metro-Stop:</strong> Hollywood/Highland — direkt am Walk of Fame aussteigen!</p><p><strong>In 30-45 Minuten schafft ihr:</strong></p><p>⭐ <strong>Walk of Fame:</strong> 2.700+ Sterne auf dem Bürgersteig. Sucht eure Lieblingsstars!</p><p>🎬 <strong>TCL Chinese Theatre</strong> (6925 Hollywood Blvd) — Handabdrücke und Fußabdrücke der Stars im Beton seit 1927!</p><p>🏔️ <strong>Hollywood Sign:</strong> Vom Hollywood Blvd gut sichtbar auf dem Berg!</p><p>💡 Der Schriftzug hieß ursprünglich „Hollywoodland" (1923) — Werbung für eine Immobilien-Siedlung!</p><p>💡 <strong>Realistisch:</strong> Hollywood Blvd ist touristisch und etwas heruntergekommen. Trotzdem: einmal muss man es sehen! 30-45 Min reichen dicke.</p>',links:[{text:'Google Maps: Hollywood/Highland Metro',url:'https://www.google.com/maps/place/Hollywood+%2F+Highland+Station,+6801+Hollywood+Blvd,+Los+Angeles,+CA+90028'},{text:'Google Maps: TCL Chinese Theatre',url:'https://www.google.com/maps/place/TCL+Chinese+Theatre,+6925+Hollywood+Blvd,+Hollywood,+CA+90028'},{text:'Google Maps: Walk of Fame',url:'https://www.google.com/maps/place/Hollywood+Walk+of+Fame,+Hollywood+Blvd,+Los+Angeles,+CA'}]},
      {emoji:'🚌',title:'DASH Shuttle → Griffith Observatory',cls:'c',body:'<p><strong>DASH Observatory/Los Feliz:</strong> Kleiner Shuttle-Bus fährt direkt rauf zum Observatory!</p><p><strong>Einstieg:</strong> Vermont/Sunset Metro Station (Red Line). Bushaltestelle direkt am Ausgang.</p><p><strong>Preis:</strong> $0.50/Person (35¢ mit TAP-Karte). Unter 5 gratis.</p><p><strong>Takt:</strong> Alle 20-25 Min, täglich 10:00-22:00 Uhr</p><p><strong>Fahrtzeit:</strong> ~20 Min bergauf durch den Griffith Park</p><p><strong>Alternative:</strong> Uber direkt vom Arts District zum Griffith Observatory (~$12, 15 Min) — spart Metro-Umstieg!</p>',links:[{text:'DASH Fahrplan',url:'https://www.ladottransit.com/dash/obslf/'},{text:'Google Maps: Vermont/Sunset Station',url:'https://www.google.com/maps/place/Vermont+%2F+Sunset+Station,+1500+N+Vermont+Ave,+Los+Angeles,+CA+90027'}]},
      {emoji:'🔭',title:'Griffith Observatory — DER Sunset Spot!',cls:'g',body:'<p><strong>Warum hierhin?</strong> DER ikonischste Aussichtspunkt in LA! Gratis Eintritt, Panoramablick über ganz LA von Downtown bis zum Pazifik, Hollywood Sign zum Greifen nah.</p><p><strong>Eintritt:</strong> GRATIS! Immer.</p><p><strong>Planetarium:</strong> $10/Person (ab 13 J.). Tickets nur vor Ort, same-day. ~25 Min Show über Sterne und Universum.</p><p><strong>Montags-Öffnung:</strong> 12:00-22:00 Uhr (montags später als sonst!)</p><p><strong>Sonnenuntergang:</strong> ~19:15 Uhr im April. Die Skyline von LA im Abendlicht + die Stadt die anfängt zu leuchten = magisch!</p><p>💡 Drehort von „La La Land" (Ryan Gosling + Emma Stone tanzten hier!) und „Rebel Without a Cause" (James Dean, 1955).</p><p>🚗 <strong>Rückweg:</strong> Uber direkt vom Observatory → Dockweiler: ~$25-30, 25 Min abends (wenig Traffic).</p>',links:[{text:'Google Maps: Griffith Observatory',url:'https://www.google.com/maps/place/Griffith+Observatory,+2800+E+Observatory+Rd,+Los+Angeles,+CA+90027'},{text:'Website & Programm',url:'https://griffithobservatory.org'},{text:'Google Maps: Uber zurück Griffith → Dockweiler',url:'https://www.google.com/maps/dir/Griffith+Observatory,+2800+E+Observatory+Rd,+Los+Angeles,+CA+90027/Dockweiler+RV+Park,+12001+Vista+Del+Mar,+Playa+Del+Rey,+CA+90293/@33.99,-118.38,12z/data=!3m1!4b1!4m14!4m13!1m5!1m1!1s0x80c2bf61e9d408cb:0x73ff07e43a5b67b4!2m2!1d-118.3004!2d34.1184!1m5!1m1!1s0x80c2b123d6b28c11:0xd82ddc6e4f5d57d!2m2!1d-118.4398!2d33.9256!3e0'}]},
      {emoji:'💰',title:'Kostenübersicht Tag 8',cls:'o',body:'<p><strong>Transport:</strong></p><p>• Metro Bike E-Bikes: 3× Tagespass $5 = <strong>$15</strong></p><p>• TAP-Karten: 3× $2 = <strong>$6</strong> (einmalig, behaltet sie!)</p><p>• Metro: max <strong>$15</strong> (Tagesdeckel $5/Person)</p><p>• DASH Shuttle: 3× $0.50 = <strong>$1.50</strong></p><p>• Uber Griffith → Dockweiler: <strong>~$25-30</strong></p><p>• Angels Flight: 3× $1.50 = <strong>$4.50</strong></p><p><strong>= ~$70 Transport</strong></p><hr><p><strong>Eintritt:</strong> Fast alles gratis! Planetarium optional 3× $10 = $30</p><p><strong>Essen:</strong> ~$40-60 (Grand Central Market + Lunch)</p><p><strong>= ~$140-175 Gesamttag</strong></p>'},

      {emoji:'\ud83d\udea1',title:'Plan A: Walk-Up Tramway',cls:'o',body:'<p><strong>Online AUSVERKAUFT f\u00fcr 7.4.</strong> \u2014 ABER Walk-Up vor Ort ist m\u00f6glich!</p><p>Die Ticketseite sagt: <em>\u201eIf tickets are sold-out online, you can still purchase tickets at the tram.\u201c</em></p><p><strong>Vorgehen:</strong></p><p>1\ufe0f\u20e3 Unterwegs anrufen: <strong>\ud83d\udcde (888) 515-8726</strong></p><p>2\ufe0f\u20e3 Wenn ja: zur Station fahren, Walk-Up Tickets an der Kasse</p><p>3\ufe0f\u20e3 Wenn nein: Plan B (Cabazon Dinos \u2192 JT voll)</p><p><strong>Preise:</strong> $36.95/Erw. Mika (15) = Erwachsenenpreis. <strong>3\u00d7 $36.95 = $110.85</strong>. RV-Parking $15.</p><p><strong>Di-Fr ab 10:00</strong>, letzte Fahrt hoch 20:00.</p><p>\ud83d\udca1 Oben kann im April Schnee liegen! 20-30\u00b0C Temperaturunterschied!</p>',links:[{text:'Tramway Website',url:'https://pstramway.com'},{text:'Google Maps: Tramway Station',url:'https://www.google.com/maps/place/Palm+Springs+Aerial+Tramway,+1+Tram+Way,+Palm+Springs,+CA+92262'}]},
      {emoji:'\ud83e\udd95',title:'Plan B: Cabazon Dinosaurs',cls:'c',body:'<p><strong>Wenn Tramway nicht klappt:</strong> Legend\u00e4rer Roadside-Stopp direkt am I-10! Zwei riesige Beton-Dinosaurier.</p><p>Bekannt aus \u201ePee-wee\u0027s Big Adventure\u201c (1985)!</p><p><strong>Eintritt:</strong> $15/Erw, $13/Kind \u2014 oder gratis Fotos vom Parkplatz.</p><p><strong>Dauer:</strong> 15 Min reichen. Liegt direkt am I-10!</p>',links:[{text:'Google Maps',url:'https://www.google.com/maps/place/Cabazon+Dinosaurs,+50770+Seminole+Dr,+Cabazon,+CA+92230'}]},
      {emoji:'\ud83c\udf35',title:'Joshua Tree National Park',body:'<p><strong>Zwei W\u00fcsten in einem Park!</strong> Mojave (Joshua Trees) trifft Colorado (Kakteen).</p><p><strong>Eintritt:</strong> $30/Fahrzeug (7 Tage g\u00fcltig!) \u2014 am Gate bar oder Karte.</p><p><strong>JT Split \u00fcber 2 Tage:</strong></p><p>\ud83c\udf05 <strong>Heute (Di):</strong> Keys View (Golden Hour! ⚠️ RV evtl. zu groß → am Visitor Center fragen!) + Cholla (SUNSET! Vorher prüfen ob offen!)</p><p>\ud83c\udf04 <strong>Morgen (Mi):</strong> Hidden Valley + Barker Dam + Skull Rock (Plan A) oder direkt weiter (Plan B)</p><p>\ud83d\udca1 Keys View bei Sonnenuntergang + Cholla im Abendlicht = MAGISCH! Besser als tags\u00fcber!</p><p>\ud83d\udca1 U2 benannten ihr Album \u201eThe Joshua Tree\u201c nach diesen B\u00e4umen!</p>',links:[{text:'Google Maps: Westeingang',url:'https://www.google.com/maps/place/Joshua+Tree+National+Park+West+Entrance'},{text:'Google Maps: Keys View',url:'https://www.google.com/maps/place/Keys+View,+Joshua+Tree+National+Park,+CA'},{text:'Google Maps: Cholla Cactus Garden',url:'https://www.google.com/maps/place/Cholla+Cactus+Garden,+Joshua+Tree+National+Park,+CA'}]},
      {emoji:'\u26fa',title:'BLM South \u2014 Gratis W\u00fcstennacht!',cls:'g',body:'<p><strong>GRATIS Stellplatz!</strong> Bureau of Land Management = \u00f6ffentliches Land, legal und kostenlos!</p><p><strong>GPS:</strong> 33.6740, -115.8071</p><p>Befestigte Schotterpisten, RV aller Gr\u00f6\u00dfen OK. Feuerringe vorhanden.</p><p>\u26a0\ufe0f <strong>KEIN Wasser, KEIN Strom, KEINE Toiletten!</strong> Alles VORHER auff\u00fcllen/erledigen!</p><p>\u2b50 <strong>Einer der besten Sternenhimmel Kaliforniens!</strong> Milchstra\u00dfe mit blo\u00dfem Auge!</p><p>\ud83d\udca1 Holz f\u00fcr Lagerfeuer vorher in Joshua Tree Village kaufen.</p><p>🔥 <strong>Campfire Permit nötig!</strong> Kostenlos: preventwildfireca.org</p><p>🐍 <strong>Klapperschlangen aktiv im April!</strong> Geschlossene Schuhe, auf Wegen bleiben, nicht in Felsspalten greifen.</p>',links:[{text:'Google Maps: BLM South',url:'https://www.google.com/maps/place/33%C2%B040%2726.4%22N+115%C2%B048%2725.6%22W/@33.6740,-115.8071,15z'}]},
      {emoji:'\u26a0\ufe0f',title:'W\u00fcsten-Checkliste \u2014 VOR ABFAHRT!',cls:'r',body:'<p><strong>HEUTE VOR 11:00 ERLEDIGEN:</strong></p><p>\u2610 <strong>Wassertank VOLL!</strong> (Dockweiler auff\u00fcllen)</p><p>\u2610 <strong>Benzintank VOLL!</strong></p><p>\u2610 Essen + Snacks f\u00fcr Abend + Fr\u00fchst\u00fcck</p><p>\u2610 Stirnlampen / Taschenlampen bereit</p><p>\u2610 M\u00fcllbeutel (Leave No Trace!)</p><p>\u2610 <strong>Offline-Karten laden!</strong> Kein Empfang im Park + BLM</p><p>\u2610 Tramway-Hotline: (888) 515-8726</p><p>\u2610 Wanderwasser: min. 2L/Person!</p><p>☐ <strong>Sonnencreme SPF 50+!</strong> UV-Index EXTREM (Stufe 11!)</p><p>☐ Hüte + Langarm-Shirts für Wüstenwanderung</p><p>☐ Campfire Permit: preventwildfireca.org (gratis!)</p><p>☐ Cholla Cactus Garden: offen? (war 2025 gesperrt)</p>'},

// =========== RENDERING ===========
function showPage(idx){
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.day-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('page'+idx).classList.add('active');
  document.getElementById('btn'+idx).classList.add('active');
  window.scrollTo(0, 100);
}

document.getElementById('dayBar').innerHTML = DAYS.map((d, i) =>
  '<button class="day-btn '+(i===0?'active ':'')+'" id="btn'+d.num+'" onclick="showPage('+d.num+')"><span class="d-num">'+d.num+'</span><span class="d-wd">'+d.wd+'</span></button>'
).join('');

let pagesHtml = '';
DAYS.forEach(d => {
  let html = '<div class="page '+(d.num===1?'active':'')+'" id="page'+d.num+'">';
  html += '<div class="day-hdr" style="background:'+d.color+'"><h2>'+d.title+'</h2><p>'+d.desc+'</p></div>';

  // Timeline
  if(d.timeline && d.timeline.length){
    html += '<h3 style="font-size:14px;margin:16px 0 8px;padding-left:4px">Timeline</h3>';
    html += '<div class="tl">';
    d.timeline.forEach((tl, i) => {
      html += '<div class="ti2"><div class="td" style="background:'+tl.c+'"></div><div style="padding-bottom:10px">';
      html += '<div class="tm" style="color:'+tl.c+'">'+tl.t+'</div>';
      html += '<div class="tn">'+tl.n+'</div>';
      html += '<div class="tx">'+tl.d+'</div></div></div>';
    });
    html += '</div>';
  }

  // Info Cards
  if(d.cards && d.cards.length){
    html += '<h3 style="font-size:14px;margin:16px 0 8px;padding-left:4px">Details & Tipps</h3>';
    d.cards.forEach(card => {
      html += '<div class="card '+(card.cls||'')+'">';
      html += '<div class="ch"><span class="ce">'+(card.emoji||'')+'</span><div><div class="ct">'+card.title+'</div></div></div>';
      html += '<div class="cb">'+card.body+'</div>';
      if(card.links && card.links.length){
        card.links.forEach(lnk => {
          html += '<a class="al" href="'+lnk.url+'" target="_blank">'+mapPin()+' '+lnk.text+'</a>&nbsp;&nbsp;';
        });
      }
      html += '</div>';
    });
  }

  // Options
  if(d.options && d.options.length){
    html += '<h3 style="font-size:14px;margin:16px 0 8px;padding-left:4px">Optionen</h3>';
    d.options.forEach(opt => {
      html += '<div class="opt-box"><h4>'+opt.title+'</h4><p style="font-size:12px;color:#475569;line-height:1.5">'+opt.desc+'</p></div>';
    });
  }

  html += '</div>';
  pagesHtml += html;
});

document.getElementById('pages').innerHTML = pagesHtml;
</script>
